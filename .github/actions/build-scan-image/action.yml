# Build the scan image once (buildx, local load, no push), generate its image
# SBOM from the local daemon, and hand it downstream as a transient
# `docker save` tarball uploaded via actions/upload-artifact — the runner's
# built-in token, no GHCR, no `packages: write`, fork-safe.
#
# Caching: uses docker/build-push-action with GHA cache (cache-from/cache-to
# type=gha) exactly as the inlined steps did; the per-job scope is an input so
# parallel extras legs never collide with the primary or each other.
name: Build scan image + SBOM + artifact
description: >-
  Buildx-build an image (local load, no push, linux/amd64, GHA cache with a
  caller-supplied scope), generate its CycloneDX image SBOM from the local
  daemon via anchore/sbom-action, docker-save it, and upload the tarball as a
  1-day actions artifact for downstream jobs to docker-load.
inputs:
  context:
    description: "Docker build context directory."
    required: true
  dockerfile:
    description: "Path to the Dockerfile."
    required: true
  target:
    description: "Docker build stage name (empty builds the last stage)."
    required: false
    default: ""
  image-tag:
    description: "Local-daemon tag the image is built, SBOM'd, and saved under."
    required: true
  build-args:
    description: "Newline-separated KEY=VALUE build args, passed through to docker/build-push-action verbatim."
    required: false
    default: ""
  cache-scope:
    description: "GHA buildx cache scope (e.g. security-scan-backend, security-scan-<name>); keeps parallel legs from colliding."
    required: true
  sbom-output-file:
    description: "Image SBOM output filename (e.g. sbom-image.json, sbom-image-<name>.json)."
    required: true
  sbom-artifact-name:
    description: "Artifact name for the image SBOM (e.g. sbom-image, sbom-image-<name>)."
    required: true
  image-artifact-name:
    description: "Artifact name for the docker-save tarball (e.g. scan-image, scan-image-<name>)."
    required: true
runs:
  using: composite
  steps:
    # The job checks out the callee (ci-scans) repo into .ci-scans to resolve
    # this action. Remove it before building so the docker build context stays
    # byte-identical to the pre-refactor workflow (consumer contexts default
    # to '.', and a `COPY .` Dockerfile would otherwise embed .ci-scans and
    # invalidate the GHA build cache). Safe: this composite is already loaded
    # and every nested action here is remote (runner action cache, not the
    # workspace). Do not add local `uses: ./.ci-scans/...` steps after this
    # one within the same job.
    - name: Prune .ci-scans from the build context
      shell: bash
      run: rm -rf .ci-scans

    - name: Build scan image (local load, no push)
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        target: ${{ inputs.target }}
        push: false
        load: true   # load into local daemon so Syft can scan + we can save it
        tags: ${{ inputs.image-tag }}
        platforms: linux/amd64
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha,scope=${{ inputs.cache-scope }}
        cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope }}
        provenance: false

    # Generate image SBOM while the image is in the local Docker daemon.
    # Syft uses its own registry client, so scanning the local daemon image
    # avoids any registry pull in a downstream job.
    - name: Generate image SBOM (from local daemon)
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
      with:
        image: ${{ inputs.image-tag }}
        format: cyclonedx-json
        output-file: ${{ inputs.sbom-output-file }}
        artifact-name: ${{ inputs.sbom-artifact-name }}

    # Hand the built image to downstream jobs as a transient artifact rather
    # than a registry tag. upload-artifact uses the runner's built-in token —
    # no GHCR, no `packages: write`, fork-safe. `docker load` restores the
    # tag in vuln-scan and cluster-smoke.
    - name: Save image to tarball
      shell: bash
      env:
        IMG: ${{ inputs.image-tag }}
      run: docker save "$IMG" -o image.tar

    - name: Upload image artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: ${{ inputs.image-artifact-name }}
        path: image.tar
        if-no-files-found: error
        retention-days: 1
