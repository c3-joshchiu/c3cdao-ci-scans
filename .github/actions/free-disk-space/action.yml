# Reclaim hosted-runner disk before large image builds/loads. The backend
# image is large (WeasyPrint + psql deps); building it, loading it into
# Docker, and `docker save`-ing it for the artifact exhausts the hosted
# runner's ~14 GB free disk. Reclaim ~20 GB of unused toolchains.
name: Free disk space
description: >-
  Remove unused hosted-runner toolchains (dotnet, ghc, android, CodeQL) and
  prune docker images to reclaim ~20 GB before large image builds/loads.
runs:
  using: composite
  steps:
    - name: Free disk space
      shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
          /usr/local/lib/android /opt/hostedtoolcache/CodeQL 2>/dev/null || true
        sudo docker image prune -af 2>/dev/null || true
        df -h /
