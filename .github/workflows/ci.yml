# Repo CI for ci-scans itself: the committed contract must always match a
# fresh extraction from workflow_call.inputs, even when the local pre-commit
# hook was skipped.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contract-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: All inputs described
        run: uv run scripts/lib/extract_contract.py --check-descriptions
      - name: Regenerate contract
        run: uv run scripts/lib/extract_contract.py
      - name: Fail on contract drift
        run: |
          git diff --exit-code contract/ README.md || { echo "::error::contract drift — run 'uv run scripts/lib/extract_contract.py' and commit the regenerated files"; exit 1; }
