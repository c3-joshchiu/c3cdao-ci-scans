# Unified security scan — single PR gate covering all CI spec gates.
#
# A single workflow owns the entire PR gate and reports as the required
# status check, instead of several independent modular scan workflows.
#
# Interface (v0.5.0): the consumer build contract is the ONLY build path.
# The consumer repo owns its build knowledge via a contract makefile
# (contract_file, default Makefile.ci) exposing four targets:
#   ci-manifest / ci-build / ci-secctx / ci-smoke-env
# `make ci-manifest` is the single source of truth for the containers list
# and the chart/health metadata; see docs/CI-CONTRACT.md.
#
# Structure:
#   caller-lint       configuration pre-flight: lint the consumer caller against
#                     the published contract — including blocking validation of
#                     the consumer contract makefile — then (when
#                     require_hardened_bases) fail closed if neither CGR nor
#                     Iron Bank pull secrets are present. Also emits the
#                     normalized containers matrix (primary + extras) and the
#                     manifest's chart/health sections as job outputs.
#                     Every scan job needs it.
#   secrets-scan      TruffleHog (parallel after caller-lint)
#   sast-semgrep      Semgrep (parallel, warn-only until baseline)
#   sast-sonarqube    SonarQube ephemeral (parallel, warn-only until baseline)
#   helm-check        helm lint + template + restricted PSS on the manifest's
#                     chart, plus the consumer's own `make ci-secctx` (after
#                     caller-lint; blocking unless image_only)
#   build             matrixed over the normalized containers list (primary +
#                     extras): builds each image via `make ci-build
#                     IMAGE=<name>`, generates its image SBOM, and hands it to
#                     downstream jobs as a transient `docker save` tarball
#                     uploaded via actions/upload-artifact.
#                     needs: caller-lint + helm-check (skips docker when PSS/helm
#                     already failed; when image_only, helm-check is skipped and
#                     builds proceed after caller-lint alone)
#   cluster-smoke     kind + `make ci-smoke-env` + helm install + health probe
#                     against the built image (needs: build) — proves the image
#                     actually boots; skipped when image_only
#   image-scan        matrixed over the same containers list: Trivy + Grype on
#                     each built image (+ its image SBOM); the primary leg also
#                     generates and scans the whole-repo source SBOM.
#                     (needs: build)
#   security-gate     aggregate pass/fail (needs: all, if: always())
#
# Build artifact handling (mirrors the modular workflows' "transient, runner-
# scoped" approach): the image moves between jobs as an uploaded artifact using
# the runner's built-in token. No GHCR push, no `packages: write`, no per-org
# hardcoding, no cleanup job — so this is fork-safe (fork PRs get a read-only
# token and can't push to a registry, but they can upload artifacts).
#
# Blocking:
#   caller-lint, build, secrets-scan are always blocking.
#   helm-check and cluster-smoke are blocking unless image_only is true
#   (infra/image-only consumers — same skip predicate as the job `if:`).
#   cluster-smoke and image-scan gate their hard-fail on the SECURITY_SCAN_BLOCKING
#   repo variable, but the gate still fails if they are skipped/cancelled/errored
#   (e.g. because the build died) — a non-success on any blocking job is a gate
#   failure, so a broken build can never sign off green.
#   sast-semgrep and sast-sonarqube are continue-on-error (warn-only)
#   until the harden baseline lands.

name: Reusable Security Gate

on:
  workflow_call:
    inputs:
      scan_image:
        description: "Local-daemon tag the primary image is built and scanned under; caller-lint requires it to equal a parsed image string or repository:tag join in the manifest's values_local file (comments ignored). Cluster-smoke kind-loads this tag with pullPolicy: Never. Passed to `make ci-build` as CI_IMAGE_TAG for the primary."
        type: string
        default: app:local
      contract_file:
        description: "Path (relative to the consumer repo root) of the consumer build-contract Makefile providing the ci-manifest / ci-build / ci-secctx / ci-smoke-env targets. `make ci-manifest` output is the single source of truth for the containers list and chart/health metadata. Start from templates/consumer/Makefile.ci."
        type: string
        default: Makefile.ci
      builder_image:
        description: "Build-stage base image, exported to `make ci-build` as CI_BUILDER_BASE (after hardened-registry failover resolution); consume it as your builder base-image build arg."
        type: string
        default: cgr.dev/chainguard/python:latest-dev
      runtime_image:
        description: "Runtime-stage base image, exported to `make ci-build` as CI_RUNTIME_BASE (after hardened-registry failover resolution); consume it as your runtime base-image build arg."
        type: string
        default: cgr.dev/chainguard/python:latest
      require_hardened_bases:
        description: "Hardened-base policy — operator posture decision, not read from a consumer file. true (default): fail the build when neither Chainguard nor Iron Bank credentials are configured. false: warn and build with the consumer-specified bases (pilot escape hatch — the consumer explicitly owns that posture). When false, Vulnerability Scan labels the run as a public-base / consumer-specified-base proxy scan — a green result is not proof the approved production image is clean."
        type: boolean
        default: true
      ironbank_registry:
        description: "Iron Bank registry host used for docker login whenever IRONBANK_* secrets are set (alongside Chainguard when both are configured). Also used when primary-base failover swaps to ironbank_* images (CGR absent, Iron Bank present). Operator decision; defaults to the DoD registry."
        type: string
        default: registry1.dso.mil
      ironbank_builder_image:
        description: "Optional Iron Bank replacement for builder_image — applied only on primary-base failover (CGR credentials absent AND Iron Bank present). Left empty, the consumer's builder_image passes through. Does not affect whether Iron Bank login runs; login is independent when IRONBANK_* is set."
        type: string
        default: ""
      ironbank_runtime_image:
        description: "Optional Iron Bank replacement for runtime_image — applied only on primary-base failover (CGR credentials absent AND Iron Bank present). Left empty, the consumer's runtime_image passes through. Does not affect whether Iron Bank login runs; login is independent when IRONBANK_* is set."
        type: string
        default: ""
      cluster_name:
        description: "kind cluster name cluster-smoke creates and loads the image into; operator choice, no consumer-file counterpart."
        type: string
        default: app-ci
      smoke_secrets:
        description: "JSON array (as a string) of Kubernetes Secrets to create in the smoke namespace before helm install — one object per entry: name (DNS-1123 secret name), literals (newline-joined KEY=VALUE string). Use for chart envFrom/secretKeyRef pre-reqs beyond what your `make ci-smoke-env` target provisions. Values are CI fixtures only — never commit real credentials. Default \"\" creates none. Prefer a multiline YAML '|' block."
        type: string
        default: ""
      image_only:
        description: "When true, skip helm-check and cluster-smoke (and omit them from the Security Gate blocking set) — for infra/image-only repos that build and vuln-scan images without a deployable app chart. Default false keeps app callers unchanged (helm + smoke still blocking)."
        type: boolean
        default: false
    secrets:
      CGR_PULL_TOKEN:
        required: false
      CGR_PULL_USERNAME:
        required: false
      IRONBANK_TOKEN:
        required: false
      IRONBANK_USERNAME:
        required: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

env:
  # Local-daemon tag only — the image is never pushed to a registry. It moves
  # between jobs as a `docker save` tarball (actions artifact), so a bare repo
  # tag is all we need; `docker load` restores this exact tag downstream.
  # MUST match inputs.scan_image to the manifest's values_local file (backend
  # image + pullPolicy: Never) — cluster-smoke `kind load`s this tag and the
  # chart's backend + migration-hook pods reference it with pullPolicy Never.
  # A mismatch = ErrImageNeverPull and the post-install migration hook hangs
  # until helm times out.
  SCAN_IMAGE: ${{ inputs.scan_image }}
  IMAGE_ARTIFACT: scan-image
  TRIVY_SEVERITY: HIGH,CRITICAL

jobs:
  # --------------------------------------------------------------------------
  # Caller lint — configuration pre-flight before anything expensive runs.
  # Validates the consumer's caller against the published contract — including
  # blocking validation of the consumer contract makefile (missing file,
  # missing ci-manifest/ci-build/ci-smoke-env targets, or an unusable
  # ci-manifest JSON are lint failures; a missing ci-secctx is a notice) —
  # then (when require_hardened_bases) checks that at least one
  # hardened-registry pull secret pair is present. No docker login here —
  # builds still authenticate. Fail closed: bad caller, broken contract, or
  # missing required registry secrets never scan.
  # --------------------------------------------------------------------------
  caller-lint:
    name: Caller Lint
    runs-on: ubuntu-latest
    outputs:
      # Normalized containers matrix (primary first, then extras) — the build
      # and image-scan jobs fromJSON() this. Always >=1 entry (the primary),
      # so those matrices can never be empty. Derived from `make ci-manifest`
      # images[] (images[0] = primary, images[1:] = extras).
      containers: ${{ steps.manifest.outputs.containers }}
      # 'true' when the normalized list has any role=extra entry. cluster-smoke
      # keys its extras artifact download / kind-load on this.
      has_extras: ${{ steps.manifest.outputs.has_extras }}
      # Manifest chart{path,values,values_local,release,namespace} and
      # health{path,port,workload_match} sections (single-line JSON objects).
      # helm-check and cluster-smoke fromJSON() these — single parse point.
      chart: ${{ steps.manifest.outputs.chart }}
      health: ${{ steps.manifest.outputs.health }}
    steps:
      # Consumer repo (github.repository = the caller's repo).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # Resolve which ci-scans ref to lint against. github.job_workflow_sha is
      # empty on pull_request-triggered reusable calls, so prefer the ref the
      # caller actually pins in its `uses:` (parsed from the caller file), then
      # job_workflow_sha, then main. Without this the lint validates against
      # main's contract regardless of the pinned ref — the wrong contract the
      # moment they diverge (e.g. piloting an as-yet-unmerged input).
      - name: Resolve callee (ci-scans) ref
        id: calleeref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          JOB_WF_SHA: ${{ github.job_workflow_sha }}
        run: |
          caller="${WORKFLOW_REF#"$GITHUB_REPOSITORY/"}"; caller="${caller%%@*}"
          ref=""
          if [ -f "$caller" ]; then
            ref="$(grep -oE 'reusable-security-gate\.yml@[^ ]+' "$caller" | head -1 | sed 's/.*@//')"
          fi
          ref="${ref:-${JOB_WF_SHA:-main}}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "::notice::caller-lint: linting against ci-scans ref '$ref'"

      # Callee tooling (lint script + contract) at the resolved ref.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: c3-joshchiu/c3cdao-ci-scans
          ref: ${{ steps.calleeref.outputs.ref }}
          path: .ci-scans-lint

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6

      - name: Lint caller against contract
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          # WORKFLOW_REF: <owner>/<repo>/<path>@<ref> — strip repo prefix + @ref
          caller="${WORKFLOW_REF#"$GITHUB_REPOSITORY/"}"
          caller="${caller%%@*}"
          if [ ! -f "$caller" ]; then
            echo "::error::caller-lint: cannot resolve caller workflow file from workflow_ref='$WORKFLOW_REF' (resolved '$caller')"
            exit 1
          fi
          uv run .ci-scans-lint/scripts/lib/lint_caller.py "$caller" \
            --contract .ci-scans-lint/contract/security-gate.schema.json \
            --consumer-root "$GITHUB_WORKSPACE"

      # Normalized manifest from `make ci-manifest`: the containers matrix
      # (primary = images[0], tagged scan_image; extras = images[1:]) plus the
      # chart/health sections. lint_caller.py is the single parse point;
      # single-line JSON so it is safe for GITHUB_OUTPUT.
      - name: Emit normalized manifest (containers + chart + health)
        id: manifest
        env:
          GATE_SCAN_IMAGE: ${{ inputs.scan_image }}
          GATE_CONTRACT_FILE: ${{ inputs.contract_file }}
        run: |
          if ! GATE_CI_MANIFEST="$(make -s -f "${GATE_CONTRACT_FILE}" ci-manifest)"; then
            echo "::error::caller-lint: 'make -s -f ${GATE_CONTRACT_FILE} ci-manifest' failed"
            exit 1
          fi
          export GATE_CI_MANIFEST
          manifest="$(uv run .ci-scans-lint/scripts/lib/lint_caller.py --emit-manifest)"
          printf '%s' "$manifest" | python3 -c '
          import json, os, sys
          doc = json.load(sys.stdin)
          sep = (",", ":")
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write("containers=" + json.dumps(doc["containers"], separators=sep) + "\n")
              out.write("chart=" + json.dumps(doc["chart"], separators=sep) + "\n")
              out.write("health=" + json.dumps(doc["health"], separators=sep) + "\n")
              extras = any(c.get("role") == "extra" for c in doc["containers"])
              out.write("has_extras=" + ("true" if extras else "false") + "\n")
          '
          echo "::notice::caller-lint: normalized manifest: $manifest"

      # Presence-only check: at least one complete registry pair (token AND
      # username). Secrets stay in the env block (Actions auto-redacts
      # ${{ secrets.* }} in logs). Never echo/printenv/declare values; never
      # enable xtrace (-x); error text names secret *keys* only.
      - name: Check hardened-registry secrets present
        if: inputs.require_hardened_bases == true || inputs.require_hardened_bases == 'true'
        env:
          CGR_PULL_TOKEN: ${{ secrets.CGR_PULL_TOKEN }}
          CGR_PULL_USERNAME: ${{ secrets.CGR_PULL_USERNAME }}
          IRONBANK_TOKEN: ${{ secrets.IRONBANK_TOKEN }}
          IRONBANK_USERNAME: ${{ secrets.IRONBANK_USERNAME }}
        run: |
          # Intentionally no -x: xtrace would print expansions containing secrets.
          set -euo pipefail
          set +x

          # Boolean presence only — do not interpolate secret values into stdout.
          cgr_tok=0; cgr_user=0; ib_tok=0; ib_user=0
          [ -n "${CGR_PULL_TOKEN:-}" ] && cgr_tok=1
          [ -n "${CGR_PULL_USERNAME:-}" ] && cgr_user=1
          [ -n "${IRONBANK_TOKEN:-}" ] && ib_tok=1
          [ -n "${IRONBANK_USERNAME:-}" ] && ib_user=1

          if [ "$cgr_tok" != "$cgr_user" ]; then
            echo "::error::Incomplete Chainguard credentials — both CGR_PULL_TOKEN and CGR_PULL_USERNAME are required for docker login."
            exit 1
          fi
          if [ "$ib_tok" != "$ib_user" ]; then
            echo "::error::Incomplete Iron Bank credentials — both IRONBANK_TOKEN and IRONBANK_USERNAME are required for docker login."
            exit 1
          fi
          if [ "$cgr_tok" = 0 ] && [ "$ib_tok" = 0 ]; then
            echo "::error::No hardened-registry credentials — add CGR_PULL_TOKEN/CGR_PULL_USERNAME (Chainguard) and/or IRONBANK_TOKEN/IRONBANK_USERNAME (Iron Bank), or set require_hardened_bases: false to accept consumer-specified bases."
            exit 1
          fi
          echo "Hardened-registry credentials present (preflight)"

  # --------------------------------------------------------------------------
  # Build — one matrixed job over the normalized containers list emitted by
  # caller-lint (primary first, then extras). Each leg builds its image once
  # via the consumer contract (`make ci-build IMAGE=<name>` with the hardened
  # bases resolved by registry-login exported as CI_BUILDER_BASE/
  # CI_RUNTIME_BASE and the required output tag as CI_IMAGE_TAG), generates
  # the image SBOM, and uploads the `docker save` tarball artifact. The
  # primary leg keeps the pre-matrix artifact names (scan-image / sbom-image);
  # extras keep scan-image-<name> / sbom-image-<name>. The matrix is never
  # empty — the normalized list always contains the primary entry — so no
  # empty-include plan failure is possible, and single-image consumers simply
  # run a one-leg matrix.
  # --------------------------------------------------------------------------
  build:
    name: Build — ${{ matrix.container.name }} image
    runs-on: ubuntu-latest
    needs: [caller-lint, helm-check]
    # When image_only, helm-check is skipped — still build after caller-lint.
    # When helm/PSS fails, do not start expensive docker builds.
    if: |
      always() &&
      needs.caller-lint.result == 'success' &&
      (inputs.image_only == true || needs.helm-check.result == 'success')
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJSON(needs.caller-lint.outputs.containers) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # Callee (ci-scans) checkout at the caller-pinned ref: this reusable
      # workflow runs cross-repo, so `uses: ./.github/actions/...` would
      # resolve against the CALLER's tree. Local composite actions are
      # referenced from this .ci-scans checkout instead.
      - name: Resolve callee (ci-scans) ref
        id: calleeref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          JOB_WF_SHA: ${{ github.job_workflow_sha }}
        run: |
          caller="${WORKFLOW_REF#"$GITHUB_REPOSITORY/"}"; caller="${caller%%@*}"
          ref=""
          if [ -f "$caller" ]; then
            ref="$(grep -oE 'reusable-security-gate\.yml@[^ ]+' "$caller" | head -1 | sed 's/.*@//')"
          fi
          ref="${ref:-${JOB_WF_SHA:-main}}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: c3-joshchiu/c3cdao-ci-scans
          ref: ${{ steps.calleeref.outputs.ref }}
          path: .ci-scans

      # The backend image is large (WeasyPrint + psql deps). Building it, loading
      # it into Docker, and `docker save`-ing it for the artifact exhausts the
      # hosted runner's ~14 GB free disk. Reclaim ~20 GB of unused toolchains.
      - name: Free disk space
        uses: ./.ci-scans/.github/actions/free-disk-space

      # Kept for consumer contract builds that use `docker buildx` in ci-build.
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      # Hardened-base login + primary-base failover resolution — every leg
      # (primary and extras) inherits the failover behavior bit-for-bit via
      # this shared action (see the action's description for the semantics).
      - name: Login to hardened base registries (Chainguard + Iron Bank)
        id: base-registry
        uses: ./.ci-scans/.github/actions/hardened-registry-login
        with:
          cgr-pull-token: ${{ secrets.CGR_PULL_TOKEN }}
          cgr-pull-username: ${{ secrets.CGR_PULL_USERNAME }}
          ironbank-token: ${{ secrets.IRONBANK_TOKEN }}
          ironbank-username: ${{ secrets.IRONBANK_USERNAME }}
          ironbank-registry: ${{ inputs.ironbank_registry }}
          builder-image: ${{ inputs.builder_image }}
          runtime-image: ${{ inputs.runtime_image }}
          ironbank-builder-image: ${{ inputs.ironbank_builder_image }}
          ironbank-runtime-image: ${{ inputs.ironbank_runtime_image }}
          require-hardened-bases: ${{ inputs.require_hardened_bases }}

      - name: Label proxy-scan posture
        if: inputs.require_hardened_bases == false || inputs.require_hardened_bases == 'false'
        run: |
          msg='Proxy-scan posture (require_hardened_bases=false): build runs with gate-reachable / consumer-specified bases. Downstream Vulnerability Scan is not an approved-prod attestation.'
          echo "::warning::$msg"
          {
            echo "## Proxy-scan posture"
            echo ""
            echo "$msg"
          } >> "$GITHUB_STEP_SUMMARY"

      # The consumer's contract_file owns the docker build: `make ci-build
      # IMAGE=<name>` with the hardened bases resolved above exported as
      # CI_BUILDER_BASE/CI_RUNTIME_BASE and the required output tag as
      # CI_IMAGE_TAG. SBOM/save/upload follow with stable artifact names so
      # every downstream job consumes the same shapes.
      - name: Build image via consumer contract (make ci-build)
        env:
          CONTRACT_FILE: ${{ inputs.contract_file }}
          CI_BUILDER_BASE: ${{ steps.base-registry.outputs.builder_image }}
          CI_RUNTIME_BASE: ${{ steps.base-registry.outputs.runtime_image }}
          CI_IMAGE_TAG: ${{ matrix.container.image }}
          IMAGE_NAME: ${{ matrix.container.name }}
        run: |
          set -euo pipefail
          make -f "$CONTRACT_FILE" ci-build IMAGE="$IMAGE_NAME"
          if ! docker image inspect "$CI_IMAGE_TAG" >/dev/null 2>&1; then
            echo "::error::contract ci-build for IMAGE '$IMAGE_NAME' did not produce the required tag '$CI_IMAGE_TAG' (CI_IMAGE_TAG)"
            exit 1
          fi

      - name: Generate image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ matrix.container.image }}
          format: cyclonedx-json
          output-file: ${{ matrix.container.role == 'primary' && 'sbom-image.json' || format('sbom-image-{0}.json', matrix.container.name) }}
          artifact-name: ${{ matrix.container.role == 'primary' && 'sbom-image' || format('sbom-image-{0}', matrix.container.name) }}

      - name: Save image to tarball
        env:
          IMG: ${{ matrix.container.image }}
        run: docker save "$IMG" -o image.tar

      # Primary keeps the stable scan-image name (env.IMAGE_ARTIFACT) that
      # cluster-smoke and the primary image-scan leg download.
      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.container.role == 'primary' && env.IMAGE_ARTIFACT || format('scan-image-{0}', matrix.container.name) }}
          path: image.tar
          if-no-files-found: error
          retention-days: 1

  # --------------------------------------------------------------------------
  # Secrets detection — TruffleHog (diff-aware, verified only)
  #
  # Job name MUST stay "TruffleHog verified-secret scan": the main ruleset
  # requires exactly that status-check context (strict policy + merge queue).
  # Renaming it would leave the required context permanently pending on every
  # future PR (including Dependabot). Do not change without updating the ruleset.
  # --------------------------------------------------------------------------
  secrets-scan:
    name: TruffleHog verified-secret scan
    runs-on: ubuntu-latest
    needs: [caller-lint]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Full history so the diff base commit is present for range scans.
          fetch-depth: 0

      # Resolve the scan range per event so the scan is diff-aware. Scanning
      # only the PR/merge-queue range (not full history) means a pre-existing
      # verified secret elsewhere in history can't block every future PR once
      # SECURITY_SCAN_BLOCKING=true — the failure mode the modular design avoided.
      - name: Resolve scan range
        id: range
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
              ;;
            merge_group)
              echo "base=${{ github.event.merge_group.base_sha }}" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.event.merge_group.head_sha }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              # workflow_dispatch / fallback: full-history scan.
              echo "base=" >> "$GITHUB_OUTPUT"
              echo "head=HEAD" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: TruffleHog scan (verified only)
        id: scan
        continue-on-error: true
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70  # v3.95.6
        with:
          path: ./
          base: ${{ steps.range.outputs.base }}
          head: ${{ steps.range.outputs.head }}
          extra_args: --only-verified

      - name: Gate on verified secrets
        run: |
          if [ "${{ steps.scan.outcome }}" = "failure" ]; then
            if [ "${{ vars.SECURITY_SCAN_BLOCKING }}" = "true" ]; then
              echo "::error::TruffleHog found verified secret(s). Failing (SECURITY_SCAN_BLOCKING=true)."
              exit 1
            fi
            echo "::warning::TruffleHog found verified secret(s). Warn-only; set SECURITY_SCAN_BLOCKING=true to enforce."
          else
            echo "No verified secrets found in the scanned range."
          fi

  # --------------------------------------------------------------------------
  # SAST — Semgrep (warn-only until harden baseline)
  # --------------------------------------------------------------------------
  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: [caller-lint]
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Install Semgrep
        run: pip install semgrep==1.159.0

      - name: Run Semgrep scan
        id: scan
        run: |
          # Exit codes: 0 = no findings, 1 = findings found (expected),
          # 2+ = real scanner error. Don't swallow real errors with `|| true`.
          set +e
          semgrep scan \
            --config auto \
            --json \
            --output semgrep-results.json \
            --no-git-ignore \
            .
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -ge 2 ]; then
            echo "::error::Semgrep failed with exit code $EXIT_CODE"
            exit "$EXIT_CODE"
          fi

      - name: Upload results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          if-no-files-found: warn

      - name: Gate on ERROR-severity findings (warn-only)
        run: |
          set -uo pipefail
          if [ ! -f semgrep-results.json ]; then
            echo "::warning::Semgrep results artifact missing — cannot count ERROR findings"
            exit 1
          fi
          if ! ERRORS=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-results.json); then
            echo "::warning::Semgrep results JSON unreadable — cannot count ERROR findings"
            exit 1
          fi
          if [ "$ERRORS" -gt 0 ]; then
            echo "::warning::Semgrep found ${ERRORS} ERROR-severity finding(s). Warn-only; change exit 0 to exit 1 below to enforce."
            exit 0  # change to `exit 1` to enforce the gate
          fi
          echo "No ERROR-severity Semgrep findings."

  # --------------------------------------------------------------------------
  # SAST — SonarQube ephemeral (warn-only until baseline)
  # --------------------------------------------------------------------------
  sast-sonarqube:
    name: SAST (SonarQube ephemeral)
    runs-on: ubuntu-latest
    needs: [caller-lint]
    timeout-minutes: 30
    continue-on-error: true
    services:
      sonarqube:
        # Hardened base: Iron Bank SonarQube (matches the modular sonarqube.yml
        # CI posture, not a public image). Uses the IRONBANK pull secrets the
        # base repo has. On forks without them the service can't pull and this
        # warn-only (continue-on-error) job errors without blocking the gate.
        image: registry1.dso.mil/ironbank/sonarsource/sonarqube/sonarqube:9.9-community
        credentials:
          username: ${{ secrets.IRONBANK_USERNAME }}
          password: ${{ secrets.IRONBANK_TOKEN }}
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Wait for SonarQube
        run: |
          for i in $(seq 1 60); do
            sq_status=$(curl -fsS http://127.0.0.1:9000/api/system/status 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            [ "$sq_status" = "UP" ] && echo "SonarQube UP after $((i*5))s" && break
            echo "[$i/60] status: $sq_status"; sleep 5
          done
          [ "$sq_status" = "UP" ] || { echo "::error::SonarQube did not start"; exit 1; }

      - name: Provision project and token
        id: sonar
        run: |
          NEW_PASS="ci-admin-${GITHUB_RUN_ID}"
          curl -fsS -u admin:admin -X POST \
            "http://127.0.0.1:9000/api/users/change_password?login=admin&previousPassword=admin&password=${NEW_PASS}"
          TOKEN=$(curl -fsS -u "admin:${NEW_PASS}" -X POST \
            "http://127.0.0.1:9000/api/user_tokens/generate?name=ci-${GITHUB_RUN_ID}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run sonar-scanner
        uses: sonarsource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e  # v8.2.0
        env:
          SONAR_TOKEN: ${{ steps.sonar.outputs.token }}
          SONAR_HOST_URL: http://127.0.0.1:9000
        with:
          args: >
            -Dsonar.projectKey=security-scan
            -Dsonar.sources=packages/,apps/
            -Dsonar.exclusions=**/node_modules/**,**/.pnpm-store/**

      # Wait for the Compute Engine task to finish before reading the gate —
      # otherwise project_status can return a stale or empty result from a prior
      # (or not-yet-computed) analysis. Mirrors the modular sonarqube.yml.
      - name: Wait for analysis task to complete
        env:
          SONAR_TOKEN: ${{ steps.sonar.outputs.token }}
        run: |
          if [ ! -f .scannerwork/report-task.txt ]; then
            echo "::error::report-task.txt not produced; analysis did not run"
            exit 1
          fi
          TASK_URL=$(grep '^ceTaskUrl=' .scannerwork/report-task.txt | cut -d'=' -f2-)
          if [ -z "$TASK_URL" ]; then
            echo "::error::ceTaskUrl missing from report-task.txt"; cat .scannerwork/report-task.txt; exit 1
          fi
          for i in $(seq 1 60); do
            STATUS=$(curl -fsS -u "${SONAR_TOKEN}:" "$TASK_URL" | python3 -c "import sys,json; print(json.load(sys.stdin)['task']['status'])")
            case "$STATUS" in
              SUCCESS) echo "Analysis complete after $((i*5))s"; break ;;
              FAILED|CANCELED) echo "::error::Analysis ended with status $STATUS"; exit 1 ;;
              *) echo "[$i/60] Analysis status: $STATUS"; sleep 5 ;;
            esac
            [ "$i" = "60" ] && { echo "::error::Analysis did not complete within 5 minutes"; exit 1; }
          done

      - name: Quality gate check (warn-only)
        id: qualitygate
        env:
          SONAR_TOKEN: ${{ steps.sonar.outputs.token }}
        run: |
          # Read the gate for the specific analysisId we just computed, not the
          # project's latest, so the result matches this run.
          ANALYSIS_ID=$(grep '^ceTaskId=' .scannerwork/report-task.txt | cut -d'=' -f2- \
            | xargs -I{} curl -fsS -u "${SONAR_TOKEN}:" "http://127.0.0.1:9000/api/ce/task?id={}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['task'].get('analysisId',''))")
          if [ -n "$ANALYSIS_ID" ]; then
            curl -fsS -u "${SONAR_TOKEN}:" \
              "http://127.0.0.1:9000/api/qualitygates/project_status?analysisId=${ANALYSIS_ID}" > quality-gate.json
          else
            curl -fsS -u "${SONAR_TOKEN}:" \
              "http://127.0.0.1:9000/api/qualitygates/project_status?projectKey=security-scan" > quality-gate.json
          fi
          result=$(python3 -c "import sys,json; print(json.load(open('quality-gate.json'))['projectStatus']['status'])")
          echo "Quality gate: $result"
          if [ "$result" = "ERROR" ]; then
            echo "::warning::SonarQube quality gate FAILED. Warn-only; change exit 0 to exit 1 to enforce."
            exit 0  # change to `exit 1` to enforce the gate
          fi

      # 90-day compliance artifact (the prescribed evidence the modular
      # sonarqube.yml uploaded; retained for audit).
      - name: Upload SonarQube compliance artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sonarqube-${{ github.run_id }}
          path: |
            quality-gate.json
            .scannerwork/report-task.txt
          retention-days: 90
          if-no-files-found: warn
          include-hidden-files: true

  # --------------------------------------------------------------------------
  # Helm chart validity — blocking unless image_only. Chart location comes
  # from the manifest's chart{} section (caller-lint job outputs).
  # --------------------------------------------------------------------------
  helm-check:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    needs: [caller-lint]
    if: ${{ inputs.image_only != true }}
    env:
      HELM_CHART_PATH: ${{ fromJSON(needs.caller-lint.outputs.chart).path }}
      HELM_VALUES_FILE: ${{ fromJSON(needs.caller-lint.outputs.chart).values }}
      HELM_RELEASE_NAME: ${{ fromJSON(needs.caller-lint.outputs.chart).release }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4

      - name: Build chart dependencies
        run: helm dependency build "./${HELM_CHART_PATH}"

      - name: helm lint
        run: helm lint "./${HELM_CHART_PATH}" -f "${HELM_VALUES_FILE}"

      - name: helm template (render check)
        run: helm template "${HELM_RELEASE_NAME}" "./${HELM_CHART_PATH}" -f "${HELM_VALUES_FILE}" > /tmp/rendered-chart.yaml

      # Restricted-PSS assertion on the rendered releases — a machine-checkable
      # re-scan of the templated securityContext rows. Ported from the modular
      # helm-validate.yml (which this workflow replaces) so that pod-security
      # enforcement isn't lost.
      - name: Resolve callee (ci-scans) ref
        id: calleeref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          JOB_WF_SHA: ${{ github.job_workflow_sha }}
        run: |
          caller="${WORKFLOW_REF#"$GITHUB_REPOSITORY/"}"; caller="${caller%%@*}"
          ref=""
          if [ -f "$caller" ]; then
            ref="$(grep -oE 'reusable-security-gate\.yml@[^ ]+' "$caller" | head -1 | sed 's/.*@//')"
          fi
          ref="${ref:-${JOB_WF_SHA:-main}}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: c3-joshchiu/c3cdao-ci-scans
          ref: ${{ steps.calleeref.outputs.ref }}
          path: .ci-scans

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6

      # The bundled restricted-PSS assertion is GATE POLICY: it always runs
      # in-gate (tamper-proof — a consumer cannot edit it out of their
      # contract_file). The consumer's own assertion then runs via
      # `make ci-secctx`; a missing target is a notice, not a failure.
      - name: Assert rendered pod-security controls (bundled, gate policy)
        run: |
          set -uo pipefail
          if ! command -v uv >/dev/null 2>&1; then
            echo "::error::helm-check requires uv on the runner for the bundled restricted-PSS assertion; setup-uv did not provide it"
            exit 1
          fi
          uv run .ci-scans/scripts/lib/assert_restricted_pss.py /tmp/rendered-chart.yaml

      - name: Run consumer contract secctx (make ci-secctx)
        env:
          CONTRACT_FILE: ${{ inputs.contract_file }}
        run: |
          set -uo pipefail
          if [ ! -f "$CONTRACT_FILE" ]; then
            echo "::error::contract file '$CONTRACT_FILE' does not exist"
            exit 1
          fi
          set +e
          make_out=$(make -n -f "$CONTRACT_FILE" ci-secctx 2>&1)
          make_rc=$?
          set -e
          if [ "$make_rc" -ne 0 ]; then
            if printf '%s\n' "$make_out" | grep -Eqi "No rule to make target|No targets specified"; then
              echo "::notice::contract file '$CONTRACT_FILE' has no ci-secctx target — bundled restricted-PSS assertion (above) is the coverage"
              exit 0
            fi
            echo "::error::make -n -f $CONTRACT_FILE ci-secctx failed (not a missing-target)"
            printf '%s\n' "$make_out"
            exit 1
          fi
          make -f "$CONTRACT_FILE" ci-secctx

  # --------------------------------------------------------------------------
  # Cluster smoke — kind + helm install + health probe against the built image.
  # helm-check (lint/template) is a static render; it can't catch a chart that
  # renders clean but crash-loops on boot (bad env, failed migration, broken
  # entrypoint). This boots the real image with the smoke prerequisites
  # provisioned by the consumer's `make ci-smoke-env` target (DB, secrets,
  # CRDs). Warn-only unless SECURITY_SCAN_BLOCKING.
  # --------------------------------------------------------------------------
  cluster-smoke:
    name: Cluster Smoke (kind + helm + health)
    runs-on: ubuntu-latest
    # build is matrixed over primary + extras; one success covers them all.
    # caller-lint is needed only to reference its manifest job outputs.
    needs: [caller-lint, build]
    if: |
      always() &&
      inputs.image_only != true &&
      needs.build.result == 'success'
    outputs:
      smoke_ok: ${{ steps.smoke_outcome.outputs.ok }}
    env:
      CLUSTER: ${{ inputs.cluster_name }}
      NAMESPACE: ${{ fromJSON(needs.caller-lint.outputs.chart).namespace }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # kind node + smoke-env DB + the loaded backend image strain the runner's
      # ~14 GB free disk; reclaim unused toolchains first (mirrors the build job).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true
          df -h /

      - name: Download image artifact (primary leg of build)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: ${{ env.IMAGE_ARTIFACT }}

      - name: Load image into local daemon
        run: docker load -i image.tar

      # Extra images are artifact-named scan-image-<name>; pattern excludes the
      # primary scan-image artifact. Each artifact lands in its own subdirectory.
      # Extras legs exist iff the normalized containers list has role=extra
      # entries (manifest images[1:]). build succeeded per the job `if:`, so
      # their artifacts are guaranteed present when declared.
      - name: Download extra image artifacts
        if: needs.caller-lint.outputs.has_extras == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: scan-image-*
          path: extra-images

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: ${{ inputs.cluster_name }}

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4

      - name: kind install + helm deploy + health smoke
        id: smoke
        # Warn-only: advisory unless SECURITY_SCAN_BLOCKING=true. Step outcome is
        # recorded below so security-gate can fail closed even when this step
        # continues on error (job result stays success).
        continue-on-error: ${{ vars.SECURITY_SCAN_BLOCKING != 'true' }}
        env:
          # Matrix jobs cannot expose per-leg outputs — the primary tag is
          # inputs.scan_image by construction (env.SCAN_IMAGE mirrors it).
          IMAGE: ${{ inputs.scan_image }}
          HEALTH_PORT: ${{ fromJSON(needs.caller-lint.outputs.health).port }}
          HEALTH_PATH: ${{ fromJSON(needs.caller-lint.outputs.health).path }}
          SMOKE_WORKLOAD_MATCH: ${{ fromJSON(needs.caller-lint.outputs.health).workload_match }}
          HELM_CHART_PATH: ${{ fromJSON(needs.caller-lint.outputs.chart).path }}
          HELM_RELEASE_NAME: ${{ fromJSON(needs.caller-lint.outputs.chart).release }}
          HELM_VALUES_FILE: ${{ fromJSON(needs.caller-lint.outputs.chart).values }}
          HELM_VALUES_LOCAL_FILE: ${{ fromJSON(needs.caller-lint.outputs.chart).values_local }}
          CONTAINERS_JSON: ${{ needs.caller-lint.outputs.containers }}
          SMOKE_SECRETS: ${{ inputs.smoke_secrets }}
          EXTRAS_BUILT: ${{ needs.caller-lint.outputs.has_extras }}
          CONTRACT_FILE: ${{ inputs.contract_file }}
        run: |
          set -uo pipefail
          fail() { echo "::warning::cluster-smoke: $1"; exit 1; }

          kind load docker-image "${IMAGE}" --name "${CLUSTER}" || fail "kind load failed"

          # Kind-load every built extras image so charts that schedule them with
          # pullPolicy: Never do not hit ErrImageNeverPull. The list comes from
          # the normalized containers output (role=extra) — the same source the
          # build matrix used (manifest images[1:]) — so tags and artifact names
          # match by construction. Fail closed when extras were declared (and
          # thus built) but an artifact/tag is missing.
          if [ "${EXTRAS_BUILT}" = "true" ]; then
            python3 - <<'PY' || fail "kind load of extras failed"
          import json, os, subprocess, sys
          from pathlib import Path

          entries = json.loads(os.environ["CONTAINERS_JSON"])
          cluster = os.environ["CLUSTER"]
          for entry in entries:
              if entry.get("role") != "extra":
                  continue
              name = entry["name"]
              tag = entry["image"]
              tar = Path("extra-images") / f"scan-image-{name}" / "image.tar"
              if not tar.is_file():
                  print(f"missing artifact for extra '{name}' at {tar}", file=sys.stderr)
                  sys.exit(1)
              subprocess.check_call(["docker", "load", "-i", str(tar)])
              subprocess.check_call(
                  ["kind", "load", "docker-image", tag, "--name", cluster]
              )
              print(f"kind-loaded extra image {tag}")
          PY
          fi

          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

          # The consumer's contract_file provisions the smoke prerequisites
          # (DB, default secret, CRDs) — see docs/CI-CONTRACT.md.
          make -f "${CONTRACT_FILE}" ci-smoke-env NAMESPACE="${NAMESPACE}" || fail "make ci-smoke-env failed"

          # Optional caller-declared Secrets (CI fixture literals only).
          python3 - <<'PY' || fail "smoke_secrets create failed"
          import json, os, subprocess, sys

          raw = (os.environ.get("SMOKE_SECRETS") or "").strip()
          if not raw or raw == "[]":
              sys.exit(0)
          try:
              entries = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"invalid smoke_secrets JSON: {e}", file=sys.stderr)
              sys.exit(1)
          if not isinstance(entries, list):
              print("smoke_secrets must be a JSON array", file=sys.stderr)
              sys.exit(1)
          ns = os.environ["NAMESPACE"]
          for idx, entry in enumerate(entries):
              if not isinstance(entry, dict):
                  print(f"smoke_secrets entry {idx} is not an object", file=sys.stderr)
                  sys.exit(1)
              name = entry.get("name")
              literals = entry.get("literals")
              if not isinstance(name, str) or not name:
                  print(f"smoke_secrets entry {idx} missing name", file=sys.stderr)
                  sys.exit(1)
              if not isinstance(literals, str) or not literals.strip():
                  print(f"smoke_secrets '{name}': literals must be a non-empty KEY=VALUE string", file=sys.stderr)
                  sys.exit(1)
              cmd = [
                  "kubectl", "-n", ns, "create", "secret", "generic", name,
                  "--dry-run=client", "-o", "yaml",
              ]
              for line in literals.splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  if "=" not in line:
                      print(f"smoke_secrets '{name}': bad literals line '{line}'", file=sys.stderr)
                      sys.exit(1)
                  cmd.append(f"--from-literal={line}")
              rendered = subprocess.check_output(cmd)
              subprocess.run(["kubectl", "apply", "-f", "-"], input=rendered, check=True)
              print(f"created smoke secret {name}")
          PY

          helm dependency build "./${HELM_CHART_PATH}" || fail "helm dependency build failed"

          # Install the app. The post-install migration hook runs alembic against
          # the ci-smoke-env DB (from the backend image, pullPolicy Never — hence
          # SCAN_IMAGE must equal values-local's scan_image). Extra images are
          # kind-loaded above when extras were built; don't --wait on the whole
          # release — gate on the backend rollout / health probe explicitly.
          helm install "${HELM_RELEASE_NAME}" "./${HELM_CHART_PATH}" \
            -n "${NAMESPACE}" \
            -f "${HELM_VALUES_FILE}" \
            -f "${HELM_VALUES_LOCAL_FILE}" \
            --timeout 5m || {
              echo "=== helm install failed — cluster diagnostics ==="
              kubectl -n "${NAMESPACE}" get pods,jobs -o wide || true
              kubectl -n "${NAMESPACE}" get events --sort-by=.lastTimestamp | tail -30 || true
              for p in $(kubectl -n "${NAMESPACE}" get pods -o name 2>/dev/null); do
                echo "--- describe ${p} ---"; kubectl -n "${NAMESPACE}" describe "${p}" | tail -25 || true
                echo "--- logs ${p} ---"; kubectl -n "${NAMESPACE}" logs "${p}" --all-containers --tail=40 || true
              done
              fail "helm install failed"
            }

          # `|| true`: grep exits 1 on no match and the step's errexit (GHA's
          # default `bash -e {0}`) would kill it here, skipping the fail-guard
          # below — the guard is the user-visible error. Workload name matching
          # comes from the manifest's health.workload_match (default 'backend').
          backend_deploy=$(kubectl -n "${NAMESPACE}" get deploy -o name | grep -i "$SMOKE_WORKLOAD_MATCH" | head -1 || true)
          [ -n "${backend_deploy}" ] || fail "no backend deployment found"
          kubectl -n "${NAMESPACE}" rollout status "${backend_deploy}" --timeout=180s || {
            echo "=== backend not ready — diagnostics ==="
            kubectl -n "${NAMESPACE}" get pods -o wide || true
            kubectl -n "${NAMESPACE}" describe "${backend_deploy}" | tail -40 || true
            for p in $(kubectl -n "${NAMESPACE}" get pods -l app.kubernetes.io/component=backend -o name 2>/dev/null; kubectl -n "${NAMESPACE}" get pods -o name 2>/dev/null | grep -i "$SMOKE_WORKLOAD_MATCH"); do
              echo "--- describe ${p} ---"; kubectl -n "${NAMESPACE}" describe "${p}" | tail -30 || true
              echo "--- logs ${p} (current) ---"; kubectl -n "${NAMESPACE}" logs "${p}" --all-containers --tail=60 || true
              echo "--- logs ${p} (previous) ---"; kubectl -n "${NAMESPACE}" logs "${p}" --all-containers --previous --tail=60 || true
            done
            fail "backend not ready"
          }

          backend_svc=$(kubectl -n "${NAMESPACE}" get svc -o name | grep -i "$SMOKE_WORKLOAD_MATCH" | head -1 || true)
          [ -n "${backend_svc}" ] || fail "no backend service found"
          kubectl -n "${NAMESPACE}" port-forward "${backend_svc}" "${HEALTH_PORT}:${HEALTH_PORT}" >/tmp/pf.log 2>&1 &
          pf_pid=$!
          sleep 6
          code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${HEALTH_PORT}${HEALTH_PATH}" || echo 000)
          kill "${pf_pid}" 2>/dev/null || true
          echo "GET ${HEALTH_PATH} -> ${code}"
          [ "${code}" = "200" ] || fail "${HEALTH_PATH} returned ${code}, expected 200"
          echo "smoke OK"

      - name: Record smoke step outcome
        id: smoke_outcome
        if: always()
        run: |
          ok=false
          if [ "${{ steps.smoke.outcome }}" = "success" ]; then ok=true; fi
          echo "ok=$ok" >> "$GITHUB_OUTPUT"
          echo "cluster-smoke step outcome=${{ steps.smoke.outcome }} smoke_ok=$ok"

  # --------------------------------------------------------------------------
  # Image scan — one matrixed job over the same normalized containers list as
  # build (never empty: the primary entry is always present). Every leg runs
  # the shared image-side scans (Trivy image, Grype image, Grype image-SBOM)
  # against its leg's artifacts; the primary leg additionally generates the
  # whole-repo source SBOM and runs the source-SBOM Trivy/Grype scans (run
  # once). Same SECURITY_SCAN_BLOCKING exit-code semantics on every leg.
  # --------------------------------------------------------------------------
  image-scan:
    name: Vulnerability Scan — ${{ matrix.container.name }} (Trivy + Grype)
    runs-on: ubuntu-latest
    # caller-lint is needed only to reference its containers output.
    needs: [caller-lint, build]
    if: needs.build.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJSON(needs.caller-lint.outputs.containers) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Label proxy-scan posture
        if: inputs.require_hardened_bases == false || inputs.require_hardened_bases == 'false'
        run: |
          msg='Proxy-scan posture (require_hardened_bases=false): this Vulnerability Scan covers the image as built with gate-reachable / consumer-specified bases. A green result is not proof the approved production image is clean — private-mirror / entitlement-unreachable OS-layer attestation stays with the consumer pipeline (IL5 / Game Warden / etc.).'
          echo "::warning::$msg"
          {
            echo "## Proxy-scan posture"
            echo ""
            echo "$msg"
          } >> "$GITHUB_STEP_SUMMARY"

      # Source SBOM is whole-repo and runs once — primary leg only.
      - name: Generate source SBOM (pnpm + uv)
        if: matrix.container.role == 'primary'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-source.json
          artifact-name: sbom-source

      # Callee (ci-scans) checkout at the caller-pinned ref: this reusable
      # workflow runs cross-repo, so `uses: ./.github/actions/...` would
      # resolve against the CALLER's tree. Local composite actions are
      # referenced from this .ci-scans checkout instead.
      - name: Resolve callee (ci-scans) ref
        id: calleeref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          JOB_WF_SHA: ${{ github.job_workflow_sha }}
        run: |
          caller="${WORKFLOW_REF#"$GITHUB_REPOSITORY/"}"; caller="${caller%%@*}"
          ref=""
          if [ -f "$caller" ]; then
            ref="$(grep -oE 'reusable-security-gate\.yml@[^ ]+' "$caller" | head -1 | sed 's/.*@//')"
          fi
          ref="${ref:-${JOB_WF_SHA:-main}}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: c3-joshchiu/c3cdao-ci-scans
          ref: ${{ steps.calleeref.outputs.ref }}
          path: .ci-scans

      # Default scanner configs + image load + Trivy image + Grype image +
      # Grype image-SBOM (also creates .trivyignore/.grype.yaml defaults the
      # primary leg's source-SBOM scans below rely on).
      - name: Image vulnerability scan (Trivy + Grype)
        uses: ./.ci-scans/.github/actions/image-vuln-scan
        with:
          image-tag: ${{ matrix.container.image }}
          image-artifact-name: ${{ matrix.container.role == 'primary' && env.IMAGE_ARTIFACT || format('scan-image-{0}', matrix.container.name) }}
          sbom-artifact-name: ${{ matrix.container.role == 'primary' && 'sbom-image' || format('sbom-image-{0}', matrix.container.name) }}
          trivy-severity: ${{ env.TRIVY_SEVERITY }}
          blocking: ${{ vars.SECURITY_SCAN_BLOCKING }}

      - name: Trivy scan — source SBOM
        if: matrix.container.role == 'primary'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: sbom
          scan-ref: sbom-source.json
          severity: ${{ env.TRIVY_SEVERITY }}
          exit-code: ${{ vars.SECURITY_SCAN_BLOCKING == 'true' && '1' || '0' }}
          trivyignores: .trivyignore

      # Trivy is not run on the image SBOM (Syft-SBOM incompatibility); the
      # direct Trivy image scan above covers those packages.

      - name: Grype scan — source SBOM
        if: matrix.container.role == 'primary'
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          sbom: sbom-source.json
          severity-cutoff: high
          fail-build: ${{ vars.SECURITY_SCAN_BLOCKING == 'true' }}
          output-format: table
          config: .grype.yaml

  # --------------------------------------------------------------------------
  # Security Gate — aggregate required check
  # --------------------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [caller-lint, build, secrets-scan, sast-semgrep, sast-sonarqube, helm-check, cluster-smoke, image-scan]
    if: always()
    steps:
      # Consumer checkout so we can parse the caller's uses: pin. job_workflow_sha
      # is empty on pull_request-triggered reusable calls (same as caller-lint).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Resolve callee (ci-scans) ref
        id: calleeref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          JOB_WF_SHA: ${{ github.job_workflow_sha }}
        run: |
          caller="${WORKFLOW_REF#"$GITHUB_REPOSITORY/"}"; caller="${caller%%@*}"
          ref=""
          if [ -f "$caller" ]; then
            ref="$(grep -oE 'reusable-security-gate\.yml@[^ ]+' "$caller" | head -1 | sed 's/.*@//' | tr -d '#')"
            ref="${ref%%[[:space:]]*}"
          fi
          ref="${ref:-${JOB_WF_SHA:-main}}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "::notice::security-gate: evaluating with ci-scans ref '$ref'"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: c3-joshchiu/c3cdao-ci-scans
          ref: ${{ steps.calleeref.outputs.ref }}
          path: .ci-scans

      - name: Evaluate scan results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          IMAGE_ONLY: ${{ inputs.image_only }}
        run: python3 .ci-scans/scripts/lib/evaluate_security_gate.py
