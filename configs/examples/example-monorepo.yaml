# Example: onboard a monorepo-style consumer — adjust owner/repo/helm paths
target:
  owner: your-org
  repo: your-monorepo
  default_branch: main
  trunk_branches:
    - main
  local_path: ../your-monorepo

ci_scans:
  owner: your-org
  repo: c3cdao-ci-scans
  ref: main

ruleset:
  profile: unified-gate
  name: security-scan-gates
  ruleset_id: null

workflows:
  enabled:
    - security-gate

security_gate:
  scan_image: app:local
  dockerfile: containers/backend/Dockerfile
  builder_image: cgr.dev/chainguard/python:latest-dev
  runtime_image: cgr.dev/chainguard/python:latest
  helm_chart_path: helm/app
  helm_values_file: helm/app/values.yaml
  helm_values_local_file: helm/app/values-local.yaml
  helm_release_name: app-ci
  cluster_name: app-ci
  namespace: app-ci
  secctx_make_target: security-helm-secctx
  app_path: apps/app/backend
  app_package: app-backend
  app_module: app.main:app
  app_port: "8000"
