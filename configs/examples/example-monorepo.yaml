# Example: onboard a monorepo-style consumer — adjust owner/repo/helm paths
target:
  owner: your-org
  repo: your-monorepo
  default_branch: main
  trunk_branches:
    - main
  local_path: ../your-monorepo

ci_scans:
  owner: your-org
  repo: c3cdao-ci-scans
  ref: main

ruleset:
  profile: unified-gate
  name: security-scan-gates
  ruleset_id: null

workflows:
  enabled:
    - security-gate
