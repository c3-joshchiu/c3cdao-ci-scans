# Security Gate caller — copied from c3cdao-ci-scans; you own this file.
# Edit the `with:` values below per each line's provenance comment for your repo.
# Keep the structure: explicit secrets map, no concurrency:, job id `security-scan`.
#
# Build knowledge lives in your contract makefile (contract_file, default
# Makefile.ci — start from templates/consumer/Makefile.ci): `make ci-manifest`
# declares your images, chart, and health probe; ci-build / ci-secctx /
# ci-smoke-env own the build, secctx assertion, and smoke prerequisites.
# See docs/CI-CONTRACT.md.
name: Security Scan

on:
  pull_request:
    branches: [main]  # ← your trunk branch(es)
  merge_group:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  security-scan:  # renaming this job id silently un-gates merges — it is half of the required check context `security-scan / Security Gate`
    permissions:
      contents: read
      pull-requests: write
      actions: write
    uses: c3-joshchiu/c3cdao-ci-scans/.github/workflows/reusable-security-gate.yml@main  # ← pin a release tag (vX.Y.Z, e.g. v0.5.0) in prod; @main only during pilot migration
    # Explicit mapping, never the inherit form — inherit only works when caller
    # and callee share an org/enterprise; across owners it silently passes
    # nothing. Explicit values evaluate in the caller's context and always work.
    secrets:
      CGR_PULL_TOKEN: ${{ secrets.CGR_PULL_TOKEN }}
      CGR_PULL_USERNAME: ${{ secrets.CGR_PULL_USERNAME }}
      IRONBANK_TOKEN: ${{ secrets.IRONBANK_TOKEN }}
      IRONBANK_USERNAME: ${{ secrets.IRONBANK_USERNAME }}
    with:
      scan_image: app:local  # local-daemon tag the primary image is built and scanned under; must equal the backend image tag in your chart's values_local file (pullPolicy: Never pair)
      contract_file: Makefile.ci  # path of your contract makefile (ci-manifest / ci-build / ci-secctx / ci-smoke-env); start from templates/consumer/Makefile.ci
      builder_image: cgr.dev/chainguard/python:latest-dev  # build-stage base image, exported to `make ci-build` as CI_BUILDER_BASE (post registry failover)
      runtime_image: cgr.dev/chainguard/python:latest  # runtime-stage base image, exported to `make ci-build` as CI_RUNTIME_BASE (post registry failover)
      require_hardened_bases: true  # true: fail the build when neither Chainguard nor Iron Bank credentials are configured; false: warn and build with your bases (pilot escape hatch)
      ironbank_builder_image: ""  # optional Iron Bank replacement for builder_image — only on primary-base failover (CGR absent AND Iron Bank present); empty = builder_image passes through
      ironbank_runtime_image: ""  # optional Iron Bank replacement for runtime_image — only on primary-base failover (CGR absent AND Iron Bank present); empty = runtime_image passes through
      cluster_name: app-ci  # kind cluster name cluster-smoke creates and loads the image into; operator choice
      image_only: false  # true: skip helm-check + cluster-smoke (image build/scan only); keep false for deployable apps
