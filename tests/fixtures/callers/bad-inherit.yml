# Lint fixture: single violation — the gate job uses `secrets: inherit`,
# which silently passes nothing across owners (no-secrets-inherit).
name: Security Scan

on:
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  security-scan:
    permissions:
      contents: read
      pull-requests: write
      actions: write
    uses: c3-joshchiu/c3cdao-ci-scans/.github/workflows/reusable-security-gate.yml@main
    secrets: inherit
    with:
      scan_image: app:local
      contract_file: Makefile.ci
      builder_image: cgr.dev/chainguard/python:latest-dev
      runtime_image: cgr.dev/chainguard/python:latest
      require_hardened_bases: true
      ironbank_builder_image: ""
      ironbank_runtime_image: ""
      cluster_name: ${{ vars.CI_CLUSTER_NAME }}
      image_only: false
