# Lint fixture: structure-intact copy of templates/callers/security-gate.yml.
# Clean — passes every lint rule. `namespace` is the single expression-valued
# `with:` key, so the expression-skip notice is observable on a clean run.
name: Security Scan

on:
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  security-scan:
    permissions:
      contents: read
      pull-requests: write
      actions: write
    uses: c3-joshchiu/c3cdao-ci-scans/.github/workflows/reusable-security-gate.yml@main
    secrets:
      CGR_PULL_TOKEN: ${{ secrets.CGR_PULL_TOKEN }}
      CGR_PULL_USERNAME: ${{ secrets.CGR_PULL_USERNAME }}
      IRONBANK_TOKEN: ${{ secrets.IRONBANK_TOKEN }}
      IRONBANK_USERNAME: ${{ secrets.IRONBANK_USERNAME }}
    with:
      scan_image: app:local
      dockerfile: containers/backend/Dockerfile
      builder_image: cgr.dev/chainguard/python:latest-dev
      runtime_image: cgr.dev/chainguard/python:latest
      runtime_apks: ""
      helm_chart_path: helm/app
      helm_values_file: helm/app/values.yaml
      helm_values_local_file: helm/app/values-local.yaml
      helm_release_name: app-ci
      cluster_name: app-ci
      namespace: ${{ vars.CI_NAMESPACE }}
      secctx_make_target: security-helm-secctx
      app_path: apps/app/backend
      app_package: app-backend
      app_module: app.main:app
      app_port: "8000"
      require_hardened_bases: true
      ironbank_builder_image: ""
      ironbank_runtime_image: ""
      extra_build_args: ""
