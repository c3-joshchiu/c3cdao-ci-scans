# Lint fixture: contract file without the optional ci-secctx target.
# Clean — ci-secctx absence is a stderr notice (the gate's bundled
# restricted-PSS assertion is the floor), never a violation.
name: Security Scan

on:
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  security-scan:
    permissions:
      contents: read
      pull-requests: write
      actions: write
    uses: c3-joshchiu/c3cdao-ci-scans/.github/workflows/reusable-security-gate.yml@main
    secrets:
      CGR_PULL_TOKEN: ${{ secrets.CGR_PULL_TOKEN }}
      CGR_PULL_USERNAME: ${{ secrets.CGR_PULL_USERNAME }}
      IRONBANK_TOKEN: ${{ secrets.IRONBANK_TOKEN }}
      IRONBANK_USERNAME: ${{ secrets.IRONBANK_USERNAME }}
    with:
      scan_image: app:local
      contract_file: Makefile.no-secctx.ci
      builder_image: cgr.dev/chainguard/python:latest-dev
      runtime_image: cgr.dev/chainguard/python:latest
      require_hardened_bases: true
      ironbank_builder_image: ""
      ironbank_runtime_image: ""
      cluster_name: ${{ vars.CI_CLUSTER_NAME }}
      image_only: false
